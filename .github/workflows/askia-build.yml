# Build and push the ASKIA-branded LibreChat image on push to `askia` branch.
# PRs targeting `askia` get a build-only validation (no push).
#
# Branding assets (favicon, logo, i18n overrides, CSS) live in the parent
# askia-light repo and are applied before the Docker build via apply-branding.sh.

name: ASKIA — Build LibreChat Image

on:
  push:
    branches: [askia]
  pull_request:
    branches: [askia]
  workflow_dispatch:
    inputs:
      tag:
        description: "Custom image tag (default: git SHA + latest)"
        required: false
        default: ""

env:
  ACR_SERVER: ${{ vars.EXTERNAL_ACR_SERVER }}
  IMAGE_NAME: librechat

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      # 1. Check out the librechat fork (this repo)
      - name: Checkout LibreChat fork
        uses: actions/checkout@v4

      # 2. Check out branding assets from askia-light (sparse checkout)
      - name: Checkout branding assets
        uses: actions/checkout@v4
        with:
          repository: Corporate-Software-AG/askia-light
          ref: main
          token: ${{ secrets.ASKIA_LIGHT_PAT }}
          sparse-checkout: |
            config/branding
            scripts/apply-branding.sh
          sparse-checkout-cone-mode: false
          path: _askia-light

      # 3. Apply branding patches
      - name: Apply branding
        run: |
          # The branding script expects to run from askia-light root and
          # patches files in ./librechat. We symlink so it finds this repo.
          ln -s "${{ github.workspace }}" _askia-light/librechat
          cd _askia-light
          bash scripts/apply-branding.sh

      # 4. Set image tags
      - name: Set image metadata
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          CUSTOM_TAG="${{ github.event.inputs.tag || '' }}"
          IMAGE_BASE="${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}"

          # Always tag with SHA
          TAGS="${IMAGE_BASE}:${SHA}"

          # On push to askia (not PR), also tag as :latest
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            TAGS="${TAGS},${IMAGE_BASE}:latest"
          fi

          # Optional custom tag
          if [[ -n "${CUSTOM_TAG}" ]]; then
            TAGS="${TAGS},${IMAGE_BASE}:${CUSTOM_TAG}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "push=${{ github.event_name != 'pull_request' }}" >> "$GITHUB_OUTPUT"

          echo "Image: ${IMAGE_BASE}"
          echo "Tags: ${TAGS}"
          echo "Push: ${{ github.event_name != 'pull_request' }}"

      # 5. Log in to ACR (skip on PR — no push needed)
      - name: Log in to ACR
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.EXTERNAL_ACR_USERNAME }}
          password: ${{ secrets.EXTERNAL_ACR_PASSWORD }}

      # 6. Set up Docker Buildx for better caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Build (and push on merge to askia)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 8. Summary
      - name: Summary
        run: |
          echo "### LibreChat ASKIA Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ steps.meta.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Pushed:** ${{ steps.meta.outputs.push }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.meta.outputs.push }}" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Image ready. Deploy with:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "azd env set LIBRECHAT_IMAGE ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "azd up" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
